syntax = "proto3";

package employee;

option go_package = "github.com/RAF-SI-2025/EXBanka-4-Backend/shared/pb/employee";

message Employee {
  int64  id             = 1;
  string first_name     = 2;
  string last_name      = 3;
  string date_of_birth  = 4;
  string gender         = 5;
  string email          = 6;
  string phone_number   = 7;
  string address        = 8;
  string username       = 9;
  string position       = 10;
  string department     = 11;
  bool   active         = 12;
  repeated string permissions = 13;
  string jmbg           = 14;
}

// password is intentionally excluded — never returned over the API

message GetAllEmployeesRequest {
  int32 page      = 1;
  int32 page_size = 2;
}

message GetAllEmployeesResponse {
  repeated Employee employees  = 1;
  int32             total_count = 2;
}

message SearchEmployeesRequest {
  string email      = 1;
  string first_name = 2;
  string last_name  = 3;
  string position   = 4;
  int32  page       = 5;
  int32  page_size  = 6;
}

message SearchEmployeesResponse {
  repeated Employee employees   = 1;
  int32             total_count = 2;
}

message GetEmployeeCredentialsRequest {
  string email = 1;
}

message GetEmployeeCredentialsResponse {
  int64           id            = 1;
  string          password_hash = 2;
  repeated string permissions   = 3;
  bool            active        = 4;
}

message CreateEmployeeRequest {
  string first_name    = 1;
  string last_name     = 2;
  string date_of_birth = 3;
  string gender        = 4;
  string email         = 5;
  string phone_number  = 6;
  string address       = 7;
  string username      = 8;
  string position      = 9;
  string department    = 10;
  string jmbg          = 11;
}

message CreateEmployeeResponse {
  Employee employee = 1;
}

message GetEmployeeByIdRequest {
  int64 id = 1;
}

message GetEmployeeByIdResponse {
  Employee employee = 1;
}

message UpdateEmployeeRequest {
  int64           id            = 1;
  string          first_name    = 2;
  string          last_name     = 3;
  string          date_of_birth = 4;
  string          gender        = 5;
  string          email         = 6;
  string          phone_number  = 7;
  string          address       = 8;
  string          username      = 9;
  string          position      = 10;
  string          department    = 11;
  bool            active        = 12;
  repeated string permissions   = 13;
  string          jmbg          = 14;
}

message UpdateEmployeeResponse {
  Employee employee = 1;
}

message ActivateEmployeeRequest {
  int64  employee_id   = 1;
  string password_hash = 2;
}
message ActivateEmployeeResponse {}

message GetEmployeeByEmailRequest  { string email = 1; }
message GetEmployeeByEmailResponse {
  int64  id         = 1;
  string first_name = 2;
  string email      = 3;
}

message UpdatePasswordRequest {
  int64  employee_id   = 1;
  string password_hash = 2;
}
message UpdatePasswordResponse {}

// Actuary management messages (issues #143–#145)

message ActuaryInfo {
  int64  employee_id   = 1;
  string first_name    = 2;
  string last_name     = 3;
  string email         = 4;
  string position      = 5;
  double limit_amount  = 6;
  double used_limit    = 7;
  bool   need_approval = 8;
}

message GetActuariesRequest {
  string email      = 1;
  string first_name = 2;
  string last_name  = 3;
  string position   = 4;
}

message GetActuariesResponse {
  repeated ActuaryInfo actuaries = 1;
}

message SetAgentLimitRequest {
  int64  employee_id  = 1;
  double limit_amount = 2;
}
message SetAgentLimitResponse {}

message ResetAgentUsedLimitRequest {
  int64 employee_id = 1;
}
message ResetAgentUsedLimitResponse {}

message SetNeedApprovalRequest {
  int64 employee_id   = 1;
  bool  need_approval = 2;
}
message SetNeedApprovalResponse {}

message ResetAllActuaryUsedLimitsRequest {}
message ResetAllActuaryUsedLimitsResponse {}

service EmployeeService {
  rpc GetAllEmployees(GetAllEmployeesRequest) returns (GetAllEmployeesResponse);
  rpc SearchEmployees(SearchEmployeesRequest) returns (SearchEmployeesResponse);
  rpc GetEmployeeCredentials(GetEmployeeCredentialsRequest) returns (GetEmployeeCredentialsResponse);
  rpc CreateEmployee(CreateEmployeeRequest) returns (CreateEmployeeResponse);
  rpc GetEmployeeById(GetEmployeeByIdRequest) returns (GetEmployeeByIdResponse);
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (UpdateEmployeeResponse);
  rpc ActivateEmployee(ActivateEmployeeRequest) returns (ActivateEmployeeResponse);
  rpc GetEmployeeByEmail(GetEmployeeByEmailRequest) returns (GetEmployeeByEmailResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
  rpc GetActuaries(GetActuariesRequest) returns (GetActuariesResponse);
  rpc SetAgentLimit(SetAgentLimitRequest) returns (SetAgentLimitResponse);
  rpc ResetAgentUsedLimit(ResetAgentUsedLimitRequest) returns (ResetAgentUsedLimitResponse);
  rpc SetNeedApproval(SetNeedApprovalRequest) returns (SetNeedApprovalResponse);
  rpc ResetAllActuaryUsedLimits(ResetAllActuaryUsedLimitsRequest) returns (ResetAllActuaryUsedLimitsResponse);
}
